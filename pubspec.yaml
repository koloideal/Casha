name: casha
description: "Personal Finance Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.5
  http: ^1.2.0
  sensors_plus: ^6.1.0
  local_auth: ^2.3.0
  flutter_colorpicker: ^1.1.0
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.20
  path: ^1.8.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0F0F14"  
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter_native_splash:
  color: "#111827"
  color_dark: "#111827"
  image: assets/icon/icon.png
  android_12:
    color: "#111827"
    color_dark: "#111827"
    image: assets/icon/icon.png
  web: false

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3
  drift_dev: ^2.14.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  fonts:
    - family: BynSymbol
      fonts:
        - asset: assets/fonts/nbrb.ttf
    - family: NunitoCyrillic
      fonts:
        - asset: assets/fonts/nunito/Nunito-Medium.ttf
        - asset: assets/fonts/nunito/Nunito-SemiBold.ttf
          weight: 500
        - asset: assets/fonts/nunito/Nunito-Bold.ttf
          weight: 600
        - asset: assets/fonts/nunito/Nunito-ExtraBold.ttf
          weight: 700
        - asset: assets/fonts/nunito/Nunito-ExtraBold.ttf
          weight: 800
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/poppins/Poppins-ExtraBold.ttf
          weight: 800
